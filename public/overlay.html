<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Guardia Queue Overlay</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:Segoe UI, sans-serif;
}

/* main card */

#card{
    position:absolute;
    left:50px;
    bottom:50px;

    width:550px;

    background:rgba(10,10,15,.82);
    backdrop-filter:blur(20px);

    border:1px solid rgba(192,132,252,.35);

    border-radius:24px;

    padding:25px;

    box-shadow:
      0 0 40px rgba(192,132,252,.15),
      0 0 80px rgba(192,132,252,.08);
}

/* title */

.title{
    color:#c084fc;
    font-size:18px;
    font-weight:700;

    letter-spacing:2px;

    margin-bottom:15px;
}

/* current */

#now{
    color:white;

    font-size:30px;
    font-weight:700;

    margin-bottom:20px;
}

/* queue items */

.item{
    background:#12121d;

    border-left:4px solid #c084fc;

    border-radius:12px;

    padding:12px;

    margin-top:10px;

    color:white;

    animation:slide .4s ease;
}

.user{
    color:#c084fc;
    font-size:13px;
    margin-top:4px;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateX(-20px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

.glow{
    position:absolute;
    width:350px;
    height:350px;

    background:#c084fc;
    filter:blur(150px);

    opacity:.15;

    left:-100px;
    bottom:-100px;

    pointer-events:none;
}
</style>
</head>

<body>

<div class="glow"></div>

<div id="card">

    <div class="title">
        ⭐ GUARDIA_CIVIIL REQUESTS
    </div>

    <div id="now">
        Waiting for requests...
    </div>

    <div id="queue"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

socket.on("queueUpdate", (queue) => {

    const now = document.getElementById("now");
    const q = document.getElementById("queue");

    q.innerHTML = "";

    if(queue.length > 0){
        now.textContent = "⭐ " + queue[0].request;
    }else{
        now.textContent = "⭐ Waiting for requests...";
    }

    queue.slice(1,6).forEach(item => {

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <div>${item.request}</div>
            <div class="user">${item.user}</div>
        `;

        q.appendChild(div);
    });
});
</script>

</body>
</html>
