<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Queue</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0a10;
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  color: #c084fc;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.box {
  flex: 1;
  background: #151424;
  padding: 20px;
  border-radius: 12px;
}

.item {
  display: flex;
  justify-content: space-between;
  background: #1e1d33;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

button {
  background: #ef4444;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  padding: 5px 10px;
}
</style>
</head>

<body>

<div class="header">⭐ guardia_civiil SR Queue</div>

<div class="container">

  <div class="box">
    <h3>Queue</h3>
    <div id="queue"></div>
  </div>

  <div class="box">
    <h3>Now Playing</h3>
    <div id="now">Nothing playing</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

socket.on("queueUpdate", (queue) => {
  const q = document.getElementById("queue");
  q.innerHTML = "";

  if (queue.length === 0) {
    q.innerHTML = "Empty queue";
    document.getElementById("now").textContent = "Nothing playing";
    return;
  }

  queue.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${i + 1}. ${item.request} — ${item.user}</span>
      <button onclick="deleteItem(${i})">✕</button>
    `;

    q.appendChild(div);
  });

  document.getElementById("now").textContent = queue[0].request;
});

async function deleteItem(index) {
  await fetch("/delete/" + index, {
    method: "DELETE"
  });
}
</script>

</body>
</html>
