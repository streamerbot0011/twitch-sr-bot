<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream Queue</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --bg: #07060d;
      --panel: rgba(18, 16, 30, 0.72);
      --border: rgba(168, 85, 247, 0.25);
      --purple: #a855f7;
      --purple2: #c084fc;
      --text: #f5f3ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #120a1f, var(--bg));
      color: var(--text);
      overflow-x: hidden;
    }

    /* glowing background orbs */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      filter: blur(120px);
      opacity: 0.25;
      z-index: 0;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
    }

    .g1 { background: var(--purple); top: -150px; left: -150px; }
    .g2 { background: #7c3aed; bottom: -150px; right: -150px; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 2;
    }

    header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--purple2);
      text-shadow: 0 0 20px rgba(192,132,252,0.4);
    }

    header p {
      opacity: 0.6;
      margin-top: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.08);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.15);
    }

    h2 {
      font-size: 16px;
      margin-bottom: 15px;
      color: var(--purple2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .item:hover {
      transform: scale(1.02);
      border-color: rgba(192,132,252,0.4);
    }

    .now {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      padding: 30px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(168,85,247,0.9), rgba(124,58,237,0.9));
      box-shadow: 0 0 40px rgba(168,85,247,0.25);
    }

    .subtext {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }

    .star {
      color: #facc15;
      text-shadow: 0 0 10px rgba(250,204,21,0.4);
    }
  </style>
</head>

<body>

  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <header>
    <h1><span class="star">⭐</span> guardia_civiil sr! </h1>
    <p>Powered by Twitch chat</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>⭐ Queue</h2>
      <div id="queue"></div>
    </div>

    <div class="card">
      <h2>⭐ Now Playing</h2>
      <div id="now" class="now">Nothing playing</div>
      <div class="subtext">Top of the queue</div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    socket.on("queueUpdate", (queue) => {
      const q = document.getElementById("queue");
      q.innerHTML = "";

      queue.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = `${i + 1}. ${item.request} — ${item.user}`;
        q.appendChild(div);
      });

      document.getElementById("now").textContent =
        queue.length ? queue[0].request : "Nothing playing";
    });
  </script>

</body>
</html>
